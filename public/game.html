<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleven</title>
<link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  font-family: "Press Start 2P";
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  padding: 30px 16px 60px;
  min-height: 100vh;
}
.wrapper { width: 1100px; max-width: 100%; }

.code {
  text-align: center;
  font-size: 16px;
  margin-bottom: 20px;
  color: #92cc41;
}

/* Main layout: game + chat */
#mainLayout {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}
#gameCol { flex: 1; min-width: 0; }
#chatCol { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; }

/* Lobby */
#lobby { text-align: center; }
#playerList { list-style: none; padding: 0; margin: 16px 0; }
#playerList li { font-size: 10px; padding: 8px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
#playerList li .tag { color: #92cc41; font-size: 8px; }
#waitMsg { font-size: 9px; color: #888; margin-top: 12px; }

/* Grid */
.row { display: flex; justify-content: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.desk {
  width: 130px; height: 100px;
  background: #3a3a3a;
  border: 4px solid #000;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  position: relative;
}
.student { font-size: 9px; margin-top: 6px; text-align: center; word-break: break-all; padding: 0 4px; }
.active { border: 4px solid red; background: #3a1a1a; }
.is-me { border: 4px solid #209cee; }
.active.is-me { border: 4px solid #92cc41; background: #1a3a1a; }
.eliminated-desk { border: 4px solid #222 !important; opacity: 0.35; }
.eliminated-desk .student { text-decoration: line-through; color: #666; }
.desk-num { position: absolute; top: 3px; right: 5px; font-size: 7px; color: #666; }

/* Game controls */
#gameControls { text-align: center; margin-bottom: 24px; }
#number { text-align: center; font-size: 48px; color: #92cc41; margin-bottom: 8px; }
#turnMsg { text-align: center; font-size: 10px; margin-bottom: 20px; min-height: 20px; }
#moveRow { display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }
#moveInput { width: 220px; }
#moveError { font-size: 9px; margin-top: 10px; min-height: 18px; text-align: center; }

/* Feed */
#feed { margin-top: 16px; text-align: center; min-height: 28px; }
#feed p { font-size: 9px; color: #e76e55; margin: 3px 0; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; } }

/* Chat */
#chatBox {
  background: #212529;
  border: 4px solid #000;
  height: 420px;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}
#chatBox::-webkit-scrollbar { width: 4px; }
#chatBox::-webkit-scrollbar-thumb { background: #444; }
.chat-msg { font-size: 8px; line-height: 1.7; word-break: break-word; }
.chat-msg .chat-name { display: block; margin-bottom: 2px; color: #92cc41; }
.chat-msg.is-me .chat-name { color: #209cee; }
.chat-msg.is-system { color: #666; font-style: italic; }
#chatInputRow { display: flex; gap: 6px; }
#chatInput { font-family: "Press Start 2P"; font-size: 9px; flex: 1; }
#chatSendBtn { font-family: "Press Start 2P"; font-size: 9px; padding: 6px 10px; }

/* Overlay */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 100;
  justify-content: center; align-items: center;
}
#overlay.show { display: flex; }
.overlay-box { width: 420px; max-width: 95vw; }

.hidden { display: none !important; }

@media (max-width: 720px) {
  #mainLayout { flex-direction: column; }
  #chatCol { width: 100%; }
  #chatBox { height: 250px; }
}
</style>
</head>
<body>

<div id="overlay">
  <section class="nes-container with-title is-dark overlay-box" id="overlayBox"></section>
</div>

<section class="nes-container with-title is-dark wrapper">
  <h2 class="title">SINIF</h2>

  <div class="code">Parti Kodu: <span id="roomCode"></span></div>

  <!-- LOBBY -->
  <div id="lobby" class="hidden">
    <h3>Oyuncular</h3>
    <ul id="playerList"></ul>
    <button id="startBtn" class="nes-btn is-primary hidden" onclick="startGame()">Oyunu Başlat</button>
    <p id="waitMsg" class="hidden">Hostin başlatması bekleniyor...</p>
  </div>

  <!-- GAME -->
  <div id="mainLayout" class="hidden">
    <div id="gameCol">
      <div id="gameControls">
        <h2 id="number">0</h2>
        <p id="turnMsg"></p>
        <div id="moveRow">
          <input id="moveInput" class="nes-input is-dark" placeholder="1 veya 1,2 veya 1,2,3" autocomplete="off">
          <button class="nes-btn is-error" onclick="sendMove()">Gönder</button>
        </div>
        <p id="moveError" class="nes-text is-error"></p>
      </div>

      <div id="feed"></div>
      <br>
      <div id="grid"></div>
    </div>

    <!-- CHAT -->
    <div id="chatCol">
      <div id="chatBox"></div>
      <div id="chatInputRow">
        <input id="chatInput" class="nes-input is-dark" placeholder="mesaj..." maxlength="200" autocomplete="off">
        <button id="chatSendBtn" class="nes-btn is-success" onclick="sendChat()">→</button>
      </div>
    </div>
  </div>

</section>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
const params = new URLSearchParams(window.location.search)
const roomCode = params.get("room")
let playerName = params.get("name") || localStorage.getItem("playerName")

document.getElementById("roomCode").innerText = roomCode

function showOverlay(html) {
  document.getElementById("overlayBox").innerHTML = html
  document.getElementById("overlay").classList.add("show")
}
function hideOverlay() {
  document.getElementById("overlay").classList.remove("show")
}

if (!playerName) {
  showOverlay(`
    <h2 class="title">Hoş Geldin</h2>
    <p>Adınız ne?</p>
    <input id="nameInput" class="nes-input is-dark" maxlength="20">
    <br><br>
    <button class="nes-btn is-success" onclick="saveName()">Devam</button>
    <p id="overlayErr" class="nes-text is-error" style="margin-top:10px;font-size:9px;min-height:16px;"></p>
  `)
} else {
  joinRoom()
}

function saveName() {
  const name = document.getElementById("nameInput").value.trim()
  if (!name) { document.getElementById("overlayErr").textContent = "İsim boş olamaz."; return }
  localStorage.setItem("playerName", name)
  playerName = name
  hideOverlay()
  joinRoom()
}

function joinRoom() {
  socket.emit("joinRoom", { name: playerName, code: roomCode })
}

socket.on("errorMessage", msg => {
  showOverlay(`
    <h2 class="title">Hata</h2>
    <p style="font-size:10px;">${msg}</p>
    <button class="nes-btn" onclick="window.location='/'">Geri Dön</button>
  `)
})

socket.on("updateRoom", data => render(data))

socket.on("playerEliminated", ({ name }) => {
  addFeed(`💀 ${name} elendi`)
  addChatSystem(`💀 ${name} elendi!`)
})

socket.on("gameOver", ({ winner, reason }) => {
  const isMe = winner === playerName
  const title = isMe ? "🏆 Kazandın!" : "Oyun Bitti"
  const sub = reason === "opponent_left"
    ? (isMe ? "Rakip ayrıldı." : `Rakip ayrıldı. Kazanan: ${winner}`)
    : (isMe ? "Tebrikler!" : `Kazanan: ${winner}`)
  showOverlay(`
    <h2 class="title">${title}</h2>
    <p style="font-size:10px;">${sub}</p>
    <br>
    <button class="nes-btn is-success" onclick="location.reload()">Tekrar Oyna</button>
    &nbsp;
    <button class="nes-btn" onclick="window.location='/'">Ana Menü</button>
  `)
})

socket.on("chatMessage", ({ name, text }) => {
  addChatMsg(name, text)
})

function render(data) {
  if (data.started) {
    document.getElementById("lobby").classList.add("hidden")
    document.getElementById("mainLayout").classList.remove("hidden")
  } else {
    document.getElementById("lobby").classList.remove("hidden")
    document.getElementById("mainLayout").classList.add("hidden")

    const list = document.getElementById("playerList")
    list.innerHTML = ""
    data.players.forEach(p => {
      const li = document.createElement("li")
      li.innerHTML = `<span>${p}</span>` + (p === data.host ? `<span class="tag">HOST ⭐</span>` : "")
      list.appendChild(li)
    })

    if (playerName === data.host) {
      document.getElementById("startBtn").classList.remove("hidden")
      document.getElementById("waitMsg").classList.add("hidden")
    } else {
      document.getElementById("startBtn").classList.add("hidden")
      document.getElementById("waitMsg").classList.remove("hidden")
    }
    return
  }

  document.getElementById("number").innerText = data.currentNumber

  const currentPlayer = data.players[data.currentPlayerIndex]
  const isMyTurn = currentPlayer === playerName
  const turnEl = document.getElementById("turnMsg")
  const moveInput = document.getElementById("moveInput")

  if (isMyTurn) {
    turnEl.innerHTML = `<span style="color:#92cc41;">⬇ Sıra sende!</span>`
    moveInput.disabled = false
    moveInput.focus()
  } else {
    turnEl.innerHTML = `<span style="color:#aaa;">Sıra: ${currentPlayer || ""}</span>`
    moveInput.disabled = true
  }

  const eliminated = data.eliminated || []
  const seats = []
  for (let i = 0; i < data.rows * data.cols; i++) {
    if (i < data.players.length) seats.push({ name: data.players[i], state: "active" })
    else if (i < data.players.length + eliminated.length) seats.push({ name: eliminated[i - data.players.length], state: "out" })
    else seats.push(null)
  }

  const grid = document.getElementById("grid")
  grid.innerHTML = ""
  let idx = 0
  for (let r = 0; r < data.rows; r++) {
    const rowDiv = document.createElement("div")
    rowDiv.className = "row"
    for (let c = 0; c < data.cols; c++) {
      const seat = seats[idx]
      const desk = document.createElement("div")
      desk.className = "desk"

      const num = document.createElement("div")
      num.className = "desk-num"
      num.textContent = idx + 1
      desk.appendChild(num)

      if (seat) {
        const nameDiv = document.createElement("div")
        nameDiv.className = "student"
        nameDiv.textContent = seat.name
        desk.appendChild(nameDiv)

        if (seat.state === "out") {
          desk.classList.add("eliminated-desk")
        } else {
          if (idx === data.currentPlayerIndex) desk.classList.add("active")
          if (seat.name === playerName) desk.classList.add("is-me")
        }
      }

      rowDiv.appendChild(desk)
      idx++
    }
    grid.appendChild(rowDiv)
  }
}

function addFeed(msg) {
  const feed = document.getElementById("feed")
  const p = document.createElement("p")
  p.textContent = msg
  feed.prepend(p)
  while (feed.children.length > 4) feed.removeChild(feed.lastChild)
}

function addChatMsg(name, text) {
  const box = document.getElementById("chatBox")
  const div = document.createElement("div")
  div.className = "chat-msg" + (name === playerName ? " is-me" : "")
  div.innerHTML = `<span class="chat-name">${escapeHtml(name)}</span>${escapeHtml(text)}`
  box.appendChild(div)
  box.scrollTop = box.scrollHeight
}

function addChatSystem(text) {
  const box = document.getElementById("chatBox")
  const div = document.createElement("div")
  div.className = "chat-msg is-system"
  div.textContent = text
  box.appendChild(div)
  box.scrollTop = box.scrollHeight
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")
}

function sendChat() {
  const input = document.getElementById("chatInput")
  const text = input.value.trim()
  if (!text) return
  socket.emit("chatMessage", text)
  input.value = ""
}

function startGame() { socket.emit("startGame") }

function sendMove() {
  const input = document.getElementById("moveInput")
  const errEl = document.getElementById("moveError")
  const val = input.value.trim()
  errEl.textContent = ""
  if (!val) { errEl.textContent = "Sayı girin."; return }
  const nums = val.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n))
  if (nums.length === 0 || nums.length > 3) {
    errEl.textContent = "1 ile 3 arasında sayı girin."
    return
  }
  socket.emit("move", nums)
  input.value = ""
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    if (document.activeElement === document.getElementById("chatInput")) sendChat()
    else sendMove()
  }
})
</script>
</body>
</html>
