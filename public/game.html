<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleven</title>
<link href="https://cdn.jsdelivr.net/npm/psone.css/ps1.css" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  background: #000;
  padding: 1.5rem 1rem 4rem;
  min-height: 100vh;
  font-family: inherit;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid #333;
  max-width: 1000px;
  margin-left: auto;
  margin-right: auto;
}
header h1 { margin: 0; font-size: 1.3rem; letter-spacing: 0.3rem; color: #fff; }
.code-tag { font-size: 0.7rem; color: #666; letter-spacing: 0.1rem; }
.code-tag b { color: #fff; }

.main { max-width: 1000px; margin: 0 auto; }

/* Lobby */
#lobby { max-width: 400px; margin: 0 auto; text-align: center; }
#lobby h2 { font-size: 0.7rem; letter-spacing: 0.2rem; color: #888; text-transform: uppercase; margin-bottom: 1rem; }
#playerList { list-style: none; padding: 0; margin: 0 0 1.5rem; }
#playerList li { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #333; font-size: 0.75rem; color: #ccc; }
#playerList li .tag { color: #aaa; font-size: 0.65rem; }
#waitMsg { font-size: 0.7rem; color: #666; margin-bottom: 1rem; }
#startBtn { width: 100%; }

/* Scoreboard */
#scoreboard {
  display: flex;
  justify-content: center;
  gap: 4rem;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.stat { text-align: center; }
.stat .val { font-size: 4rem; color: #fff; line-height: 1; display: block; }
.stat .lbl { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.15rem; margin-top: 0.3rem; display: block; }

#turnBanner {
  text-align: center;
  padding: 0.7rem;
  margin-bottom: 1.2rem;
  font-size: 0.75rem;
  color: #666;
  border: 1px solid #333;
}
#turnBanner.my-turn { border-color: #fff; color: #fff; }

#moveArea { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 0.3rem; }
#moveArea input { width: 200px; }
#moveArea button { }
#moveError { text-align: center; font-size: 0.7rem; color: #e74c3c; min-height: 1rem; margin-bottom: 1.2rem; }

/* Feed */
#feed { text-align: center; margin-bottom: 1rem; min-height: 1.5rem; }
#feed p { font-size: 0.72rem; color: #e74c3c; padding: 2px 0; animation: fi 0.2s ease; }
@keyframes fi { from { opacity: 0; } to { opacity: 1; } }

/* Grid */
#grid { display: flex; flex-direction: column; gap: 8px; align-items: center; margin-top: 1rem; }
.grid-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.desk {
  width: 110px; height: 78px;
  background: #111;
  border: 1px solid #333;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  position: relative;
  transition: border-color 0.15s;
}
.desk .dnum { position: absolute; top: 3px; right: 5px; font-size: 0.6rem; color: #444; }
.desk .dname { font-size: 0.68rem; text-align: center; padding: 0 4px; word-break: break-all; color: #ccc; }
.desk.is-active { border-color: #fff; background: #1a1a1a; }
.desk.is-active .dname { color: #fff; }
.desk.is-me { border-color: #888; }
.desk.is-out { opacity: 0.25; }
.desk.is-out .dname { text-decoration: line-through; }

/* Overlay */
#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 1rem; }
#overlay.show { display: flex; }
#overlayBox { background: #111; border: 1px solid #444; padding: 2rem; width: 100%; max-width: 380px; text-align: center; }
#overlayBox h2 { color: #fff; font-size: 1rem; letter-spacing: 0.2rem; margin-bottom: 0.8rem; }
#overlayBox p { color: #888; font-size: 0.75rem; margin-bottom: 1.5rem; }
#overlayBox input { width: 100%; margin-bottom: 0.5rem; }
#overlayErr { font-size: 0.7rem; color: #e74c3c; min-height: 1rem; margin-bottom: 0.5rem; }
.btn-row { display: flex; gap: 0.5rem; }
.btn-row button { flex: 1; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="overlay">
  <div id="overlayBox"></div>
</div>

<header>
  <h1>ELEVEN</h1>
  <div class="code-tag">KOD: <b id="roomCode"></b></div>
</header>

<div class="main">

  <!-- LOBBY -->
  <div id="lobby" class="hidden">
    <h2>Oyuncular</h2>
    <ul id="playerList"></ul>
    <p id="waitMsg" class="hidden">Host oyunu başlatmasını bekliyor...</p>
    <button id="startBtn" class="ps1-btn is-primary hidden" onclick="startGame()">Oyunu Başlat</button>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="ps1-container is-dark" style="margin-bottom:1.5rem;">
      <div id="scoreboard">
        <div class="stat">
          <span class="val" id="numberDisplay">0</span>
          <span class="lbl">Sayaç</span>
        </div>
        <div class="stat">
          <span class="val" id="aliveCount">-</span>
          <span class="lbl">Kalan</span>
        </div>
      </div>
    </div>

    <div id="turnBanner">-</div>

    <div id="moveArea">
      <input class="ps1-input" id="moveInput" type="text" placeholder="1  veya  1,2  veya  1,2,3" autocomplete="off" style="margin:0;">
      <button class="ps1-btn is-error" onclick="sendMove()" style="width:auto;">Gönder</button>
    </div>
    <div id="moveError"></div>

    <div id="feed"></div>
    <div id="grid"></div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
const params = new URLSearchParams(window.location.search)
const roomCode = params.get("room")
let playerName = params.get("name") || localStorage.getItem("playerName")

document.getElementById("roomCode").innerText = roomCode

function showOverlay(html) {
  document.getElementById("overlayBox").innerHTML = html
  document.getElementById("overlay").classList.add("show")
}
function hideOverlay() {
  document.getElementById("overlay").classList.remove("show")
}

if (!playerName) {
  showOverlay(`
    <h2>HOŞ GELDİN</h2>
    <p>Adınız ne?</p>
    <input class="ps1-input" id="nameInput" type="text" placeholder="isminiz..." maxlength="20">
    <div id="overlayErr"></div>
    <button class="ps1-btn is-primary" onclick="saveName()" style="width:100%">Devam</button>
  `)
} else {
  joinRoom()
}

function saveName() {
  const name = document.getElementById("nameInput").value.trim()
  if (!name) { document.getElementById("overlayErr").textContent = "İsim boş olamaz."; return }
  localStorage.setItem("playerName", name)
  playerName = name
  hideOverlay()
  joinRoom()
}

function joinRoom() {
  socket.emit("joinRoom", { name: playerName, code: roomCode })
}

socket.on("errorMessage", msg => {
  showOverlay(`
    <h2>HATA</h2>
    <p>${msg}</p>
    <button class="ps1-btn" onclick="window.location='/'" style="width:100%">Geri Dön</button>
  `)
})

socket.on("updateRoom", data => render(data))
socket.on("playerEliminated", ({ name }) => addFeed(`💀 ${name} elendi`))

socket.on("gameOver", ({ winner, reason }) => {
  const isMe = winner === playerName
  const title = isMe ? "KAZANDIN!" : "OYUN BİTTİ"
  const sub = reason === "opponent_left"
    ? (isMe ? "Rakip ayrıldı." : `Rakip ayrıldı. Kazanan: ${winner}`)
    : (isMe ? "Tebrikler!" : `Kazanan: ${winner}`)
  showOverlay(`
    <h2>${title}</h2>
    <p>${sub}</p>
    <div class="btn-row">
      <button class="ps1-btn is-success" onclick="location.reload()">Tekrar</button>
      <button class="ps1-btn" onclick="window.location='/'">Menü</button>
    </div>
  `)
})

function render(data) {
  if (data.started) {
    document.getElementById("lobby").classList.add("hidden")
    document.getElementById("game").classList.remove("hidden")
  } else {
    document.getElementById("lobby").classList.remove("hidden")
    document.getElementById("game").classList.add("hidden")

    const list = document.getElementById("playerList")
    list.innerHTML = ""
    data.players.forEach(p => {
      const li = document.createElement("li")
      li.innerHTML = `<span>${p}</span>` + (p === data.host ? `<span class="tag">HOST</span>` : "")
      list.appendChild(li)
    })

    if (playerName === data.host) {
      document.getElementById("startBtn").classList.remove("hidden")
      document.getElementById("waitMsg").classList.add("hidden")
    } else {
      document.getElementById("startBtn").classList.add("hidden")
      document.getElementById("waitMsg").classList.remove("hidden")
    }
    return
  }

  document.getElementById("numberDisplay").textContent = data.currentNumber
  document.getElementById("aliveCount").textContent = data.players.length

  const currentPlayer = data.players[data.currentPlayerIndex]
  const isMyTurn = currentPlayer === playerName
  const banner = document.getElementById("turnBanner")
  const input = document.getElementById("moveInput")

  if (isMyTurn) {
    banner.textContent = "⬇ Sıra sende!"
    banner.className = "my-turn"
    input.disabled = false
    input.focus()
  } else {
    banner.textContent = `Sıra: ${currentPlayer || ""}`
    banner.className = ""
    input.disabled = true
  }

  const eliminated = data.eliminated || []
  const seats = []
  for (let i = 0; i < data.rows * data.cols; i++) {
    if (i < data.players.length) seats.push({ name: data.players[i], state: "active" })
    else if (i < data.players.length + eliminated.length) seats.push({ name: eliminated[i - data.players.length], state: "out" })
    else seats.push(null)
  }

  const grid = document.getElementById("grid")
  grid.innerHTML = ""
  let idx = 0
  for (let r = 0; r < data.rows; r++) {
    const row = document.createElement("div")
    row.className = "grid-row"
    for (let c = 0; c < data.cols; c++) {
      const seat = seats[idx]
      const desk = document.createElement("div")
      desk.className = "desk"
      const num = document.createElement("div")
      num.className = "dnum"
      num.textContent = idx + 1
      desk.appendChild(num)
      if (seat) {
        const nameEl = document.createElement("div")
        nameEl.className = "dname"
        nameEl.textContent = seat.name
        desk.appendChild(nameEl)
        if (seat.state === "out") {
          desk.classList.add("is-out")
        } else {
          if (idx === data.currentPlayerIndex) desk.classList.add("is-active")
          if (seat.name === playerName) desk.classList.add("is-me")
        }
      }
      row.appendChild(desk)
      idx++
    }
    grid.appendChild(row)
  }
}

function addFeed(msg) {
  const feed = document.getElementById("feed")
  const p = document.createElement("p")
  p.textContent = msg
  feed.prepend(p)
  while (feed.children.length > 4) feed.removeChild(feed.lastChild)
}

function startGame() { socket.emit("startGame") }

function sendMove() {
  const input = document.getElementById("moveInput")
  const errEl = document.getElementById("moveError")
  const val = input.value.trim()
  errEl.textContent = ""
  if (!val) { errEl.textContent = "Sayı girin."; return }
  const nums = val.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n))
  if (nums.length === 0 || nums.length > 3) { errEl.textContent = "1 ile 3 arasında sayı girin."; return }
  socket.emit("move", nums)
  input.value = ""
}

document.addEventListener("keydown", e => { if (e.key === "Enter") sendMove() })
</script>
</body>
</html>
