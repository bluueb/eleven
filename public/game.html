<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleven</title>
<link rel="stylesheet" href="https://unpkg.com/7.css">
<style>
  body {
    background: #1a3a5c url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="4" height="4" fill="%231a3a5c"/><rect width="1" height="1" fill="%23204a72" opacity="0.5"/></svg>');
    min-height: 100vh;
    padding: 12px;
    padding-bottom: 40px;
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
    box-sizing: border-box;
  }

  /* Overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #overlay.visible {
    display: flex;
  }
  #overlayBox {
    min-width: 280px;
    max-width: 340px;
  }

  .main-area {
    max-width: 900px;
    margin: 0 auto;
  }

  /* Stats bar */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .stat-window {
    flex: 1;
    min-width: 130px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: bold;
    text-align: center;
    padding: 8px 0 4px;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    text-align: center;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-bottom: 6px;
  }

  /* Turn banner */
  #turnBanner {
    padding: 6px 10px;
    font-size: 12px;
    margin-bottom: 8px;
    text-align: center;
  }

  /* Move input row */
  .move-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 2px;
  }

  .move-row input {
    flex: 1;
  }

  #moveError {
    font-size: 11px;
    color: #c0392b;
    min-height: 16px;
    margin-bottom: 8px;
  }

  /* Feed */
  #feed {
    min-height: 20px;
    margin-bottom: 8px;
    text-align: center;
  }
  #feed p {
    font-size: 11px;
    color: #c0392b;
    margin: 1px 0;
  }

  /* Grid */
  #grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .desk-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .desk {
    width: 100px;
    height: 72px;
    border: 2px solid #999;
    background: #d4d0c8;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
    font-size: 11px;
    text-align: center;
    padding: 2px;
    box-sizing: border-box;
    box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
  }

  .desk.active-turn {
    border-color: #0078d7;
    background: #cce4f7;
    box-shadow: inset 1px 1px 0 #aad4f0, inset -1px -1px 0 #0055a5;
  }

  .desk.is-me {
    border-color: #e07b00;
    box-shadow: inset 1px 1px 0 #ffe0a0, inset -1px -1px 0 #a05000;
  }

  .desk.eliminated {
    opacity: 0.3;
    background: #bbb;
  }

  .desk.eliminated .desk-name {
    text-decoration: line-through;
    color: #666;
  }

  .desk-num {
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 9px;
    color: #888;
  }

  .desk-name {
    word-break: break-all;
    font-size: 11px;
    line-height: 1.2;
    color: #000;
  }

  /* Player list in lobby */
  #playerList {
    list-style: none;
    padding: 0;
    margin: 0 0 12px;
    border: 1px solid #999;
    background: white;
  }

  #playerList li {
    padding: 4px 8px;
    font-size: 12px;
    border-bottom: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #playerList li:last-child {
    border-bottom: none;
  }

  .host-badge {
    font-size: 10px;
    background: #0078d7;
    color: white;
    padding: 1px 5px;
    border-radius: 2px;
  }

  #lobby {
    max-width: 320px;
    margin: 0 auto;
  }

  .window-body.has-space {
    padding: 10px;
  }
</style>
</head>
<body>

  <!-- Overlay -->
  <div id="overlay">
    <div id="overlayBox" class="window active">
      <div class="title-bar">
        <div class="title-bar-text" id="overlayTitle">Bilgi</div>
        <div class="title-bar-controls">
          <button aria-label="Close" onclick="hideOverlay()"></button>
        </div>
      </div>
      <div class="window-body has-space" id="overlayBody"></div>
    </div>
  </div>

  <div class="main-area">

    <!-- HEADER -->
    <div class="window active" style="margin-bottom: 12px;">
      <div class="title-bar">
        <div class="title-bar-text">ELEVEN — Sayı Oyunu</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="status-bar">
        <p class="status-bar-field">Oda Kodu: <strong id="roomCode">...</strong></p>
        <p class="status-bar-field" id="statusField">Bekleniyor...</p>
      </div>
    </div>

    <!-- LOBBY -->
    <div id="lobby" style="display:none;">
      <div class="window active" style="max-width: 320px; margin: 0 auto;">
        <div class="title-bar">
          <div class="title-bar-text">Lobi — Oyuncular</div>
        </div>
        <div class="window-body has-space">
          <ul id="playerList"></ul>
          <p id="waitMsg" style="display:none; font-size:11px; color:#555; text-align:center; margin-bottom:8px;">Host oyunu başlatmasını bekliyor...</p>
          <div style="text-align:right;">
            <button id="startBtn" class="default" style="display:none;" onclick="startGame()">Oyunu Başlat</button>
          </div>
        </div>
      </div>
    </div>

    <!-- GAME -->
    <div id="game" style="display:none;">

      <!-- Stats -->
      <div class="stats-row">
        <div class="window active stat-window">
          <div class="title-bar"><div class="title-bar-text">Sayaç</div></div>
          <div class="window-body">
            <div class="stat-value" id="numberDisplay">0</div>
            <div class="stat-label">Güncel Sayı</div>
          </div>
        </div>
        <div class="window active stat-window">
          <div class="title-bar"><div class="title-bar-text">Kalan</div></div>
          <div class="window-body">
            <div class="stat-value" id="aliveCount">-</div>
            <div class="stat-label">Oyuncu</div>
          </div>
        </div>
      </div>

      <!-- Turn + Move -->
      <div class="window active" style="margin-bottom: 12px;">
        <div class="title-bar">
          <div class="title-bar-text">Hamle Yap</div>
        </div>
        <div class="window-body has-space">
          <div id="turnBanner">—</div>
          <div class="move-row">
            <input id="moveInput" type="text" placeholder="1  veya  1,2  veya  1,2,3" autocomplete="off" disabled>
            <button onclick="sendMove()">Gönder</button>
          </div>
          <div id="moveError"></div>
          <div id="feed"></div>
        </div>
      </div>

      <!-- Grid -->
      <div class="window active">
        <div class="title-bar"><div class="title-bar-text">Sınıf Düzeni</div></div>
        <div class="window-body has-space">
          <div id="grid"></div>
        </div>
      </div>

    </div>

  </div><!-- /main-area -->

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
const params = new URLSearchParams(window.location.search)
const roomCode = params.get("room")
let playerName = params.get("name") || localStorage.getItem("playerName")

document.getElementById("roomCode").textContent = roomCode || "—"

function showOverlay(title, html, canClose) {
  document.getElementById("overlayTitle").textContent = title
  document.getElementById("overlayBody").innerHTML = html
  document.getElementById("overlay").classList.add("visible")
}

function hideOverlay() {
  document.getElementById("overlay").classList.remove("visible")
}

if (!playerName) {
  showOverlay("Hoş Geldin", `
    <p style="font-size:12px; margin-bottom:8px;">Adınız ne?</p>
    <div style="margin-bottom:6px;">
      <input id="nameInput" type="text" placeholder="isminiz..." maxlength="20" style="width:100%; box-sizing:border-box;">
    </div>
    <p id="overlayErr" style="color:#c00; font-size:11px; min-height:14px; margin-bottom:8px;"></p>
    <div style="text-align:right;">
      <button class="default" onclick="saveName()">Devam</button>
    </div>
  `, false)
} else {
  joinRoom()
}

function saveName() {
  const name = document.getElementById("nameInput").value.trim()
  if (!name) { document.getElementById("overlayErr").textContent = "İsim boş olamaz."; return }
  localStorage.setItem("playerName", name)
  playerName = name
  hideOverlay()
  joinRoom()
}

function joinRoom() {
  socket.emit("joinRoom", { name: playerName, code: roomCode })
}

socket.on("errorMessage", msg => {
  showOverlay("Hata", `
    <p style="font-size:12px; margin-bottom:12px;">${msg}</p>
    <div style="text-align:right;">
      <button onclick="window.location='/'">Ana Menüye Dön</button>
    </div>
  `, false)
})

socket.on("updateRoom", data => render(data))
socket.on("playerEliminated", ({ name }) => addFeed(`💀 ${name} elendi`))

socket.on("gameOver", ({ winner, reason }) => {
  const isMe = winner === playerName
  const title = isMe ? "🏆 Kazandın!" : "Oyun Bitti"
  const sub = reason === "opponent_left"
    ? (isMe ? "Rakip ayrıldı." : `Rakip ayrıldı. Kazanan: <b>${winner}</b>`)
    : (isMe ? "Tebrikler!" : `Kazanan: <b>${winner}</b>`)
  showOverlay(title, `
    <p style="font-size:12px; margin-bottom:14px;">${sub}</p>
    <div style="display:flex; gap:6px; justify-content:flex-end;">
      <button class="default" onclick="location.reload()">Tekrar</button>
      <button onclick="window.location='/'">Ana Menü</button>
    </div>
  `, false)
})

function render(data) {
  if (data.started) {
    document.getElementById("lobby").style.display = "none"
    document.getElementById("game").style.display = "block"
    document.getElementById("statusField").textContent = "Oyun devam ediyor"
  } else {
    document.getElementById("lobby").style.display = "block"
    document.getElementById("game").style.display = "none"
    document.getElementById("statusField").textContent = "Lobi — oyuncular bekleniyor"

    const list = document.getElementById("playerList")
    list.innerHTML = ""
    data.players.forEach(p => {
      const li = document.createElement("li")
      li.innerHTML = `<span>${p}</span>` + (p === data.host ? `<span class="host-badge">HOST</span>` : "")
      list.appendChild(li)
    })

    document.getElementById("startBtn").style.display = playerName === data.host ? "inline-block" : "none"
    document.getElementById("waitMsg").style.display = playerName !== data.host ? "block" : "none"
    return
  }

  document.getElementById("numberDisplay").textContent = data.currentNumber
  document.getElementById("aliveCount").textContent = data.players.length

  const currentPlayer = data.players[data.currentPlayerIndex]
  const isMyTurn = currentPlayer === playerName
  const banner = document.getElementById("turnBanner")
  const input = document.getElementById("moveInput")

  if (isMyTurn) {
    banner.innerHTML = `<strong>⬇ Sıra sende!</strong>`
    banner.style.background = "#dff0d8"
    banner.style.border = "1px solid #5cb85c"
    banner.style.color = "#2d6a2d"
    input.disabled = false
    input.focus()
  } else {
    banner.innerHTML = `Sıra: <b>${currentPlayer || ""}</b>`
    banner.style.background = "#f5f5f5"
    banner.style.border = "1px solid #ccc"
    banner.style.color = "#555"
    input.disabled = true
  }

  const eliminated = data.eliminated || []
  const seats = []
  for (let i = 0; i < data.rows * data.cols; i++) {
    if (i < data.players.length) seats.push({ name: data.players[i], state: "active" })
    else if (i < data.players.length + eliminated.length) seats.push({ name: eliminated[i - data.players.length], state: "out" })
    else seats.push(null)
  }

  const grid = document.getElementById("grid")
  grid.innerHTML = ""
  let idx = 0
  for (let r = 0; r < data.rows; r++) {
    const row = document.createElement("div")
    row.className = "desk-row"
    for (let c = 0; c < data.cols; c++) {
      const seat = seats[idx]
      const desk = document.createElement("div")
      desk.className = "desk"

      const num = document.createElement("div")
      num.className = "desk-num"
      num.textContent = idx + 1
      desk.appendChild(num)

      if (seat) {
        const nameEl = document.createElement("div")
        nameEl.className = "desk-name"
        nameEl.textContent = seat.name
        desk.appendChild(nameEl)

        if (seat.state === "out") {
          desk.classList.add("eliminated")
        } else {
          if (idx === data.currentPlayerIndex) desk.classList.add("active-turn")
          if (seat.name === playerName) desk.classList.add("is-me")
        }
      }

      row.appendChild(desk)
      idx++
    }
    grid.appendChild(row)
  }
}

function addFeed(msg) {
  const feed = document.getElementById("feed")
  const p = document.createElement("p")
  p.textContent = msg
  feed.prepend(p)
  while (feed.children.length > 4) feed.removeChild(feed.lastChild)
}

function startGame() { socket.emit("startGame") }

function sendMove() {
  const input = document.getElementById("moveInput")
  const errEl = document.getElementById("moveError")
  const val = input.value.trim()
  errEl.textContent = ""
  if (!val) { errEl.textContent = "Sayı girin."; return }
  const nums = val.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n))
  if (nums.length === 0 || nums.length > 3) { errEl.textContent = "1 ile 3 arasında sayı girin."; return }
  socket.emit("move", nums)
  input.value = ""
}

document.addEventListener("keydown", e => { if (e.key === "Enter") sendMove() })
</script>
</body>
</html>
