<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eleven</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/nes.css/css/nes.min.css" rel="stylesheet" id="nesCss" disabled>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body.classic * { font-family: 'Inter', sans-serif; }
  body.retro * { font-family: 'Press Start 2P', monospace; font-size: 10px; }

  /* Classic */
  body.classic { background: #0a0a0a; color: #f5f5f5; }
  body.classic .card { background: #171717; border: 1px solid #262626; border-radius: 16px; padding: 24px; }
  body.classic input {
    background: #262626; border: 1px solid #404040; border-radius: 12px;
    padding: 10px 16px; font-size: 14px; color: #fff; outline: none; width: 100%;
    transition: border-color 0.15s; box-sizing: border-box;
  }
  body.classic input:focus { border-color: #737373; }
  body.classic .btn-primary {
    background: #fff; color: #0a0a0a; border: none; border-radius: 12px;
    padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background 0.15s;
  }
  body.classic .btn-primary:hover { background: #e5e5e5; }
  body.classic .btn-secondary {
    background: #262626; color: #fff; border: 1px solid #404040; border-radius: 12px;
    padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background 0.15s;
  }
  body.classic .btn-secondary:hover { background: #333; }
  body.classic .icon-btn { background: none; border: none; color: #525252; cursor: pointer; padding: 6px; border-radius: 8px; transition: color 0.15s, background 0.15s; display: flex; align-items: center; }
  body.classic .icon-btn:hover { color: #fff; background: #262626; }
  body.classic .muted { color: #525252; }
  body.classic .semi { color: #737373; }
  body.classic .modal { background: #171717; border: 1px solid #262626; border-radius: 20px; padding: 24px; width: 100%; max-width: 320px; }
  body.classic .theme-btn { border: 1px solid #404040; border-radius: 10px; padding: 10px 16px; cursor: pointer; background: #262626; color: #fff; font-size: 13px; transition: all 0.15s; flex: 1; }
  body.classic .theme-btn:hover { border-color: #737373; }
  body.classic .theme-btn.active { border-color: #fff; background: #333; }
  body.classic .desk-base { background: #171717; border: 1px solid #262626; border-radius: 12px; transition: all 0.15s; }
  body.classic .desk-active-turn { border-color: rgba(255,255,255,0.3) !important; background: rgba(255,255,255,0.04) !important; }
  body.classic .desk-me { border-color: #737373 !important; }
  body.classic .banner-my-turn { border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); color: #fff; border-radius: 12px; }
  body.classic .banner-waiting { border: 1px solid #262626; color: #525252; border-radius: 12px; }
  body.classic .divider-line { background: #262626; }
  body.classic .player-li { border-bottom: 1px solid #262626; }

  /* Retro */
  body.retro { background: #212529; color: #fff; }
  body.retro .icon-btn { background: none; border: none; color: #aaa; cursor: pointer; padding: 6px; display: flex; align-items: center; }
  body.retro .muted { color: #888; }
  body.retro .semi { color: #aaa; }
  body.retro .modal { background: #212529; border: 4px solid #fff; padding: 24px; width: 100%; max-width: 320px; }
  body.retro .theme-btn { border: 4px solid #555; padding: 8px 12px; cursor: pointer; background: #333; color: #fff; font-size: 8px; transition: all 0.15s; font-family: 'Press Start 2P', monospace; flex: 1; }
  body.retro .theme-btn.active { border-color: #92cc41; }
  body.retro .desk-base { border: 4px solid #555; padding: 4px; }
  body.retro .desk-active-turn { border-color: #92cc41 !important; }
  body.retro .desk-me { border-color: #209cee !important; }
  body.retro .banner-my-turn { border: 4px solid #92cc41; color: #92cc41; padding: 8px; }
  body.retro .banner-waiting { border: 4px solid #555; color: #888; padding: 8px; }
  body.retro .divider-line { background: #444; }
  body.retro .player-li { border-bottom: 2px solid #333; }
</style>
</head>
<body class="classic min-h-screen p-4 pb-16">

  <!-- Overlay -->
  <div id="overlay" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div id="overlayBox" class="modal"></div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="modal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span style="font-weight:600;">ayarlar</span>
        <button class="icon-btn" onclick="closeSettings()">
          <i data-lucide="x" style="width:16px;height:16px;"></i>
        </button>
      </div>
      <p style="font-size:11px; color:#737373; margin-bottom:8px;">tema</p>
      <div style="display:flex; gap:8px;">
        <button class="theme-btn" id="btnClassic" onclick="setTheme('classic')">klasik</button>
        <button class="theme-btn" id="btnRetro" onclick="setTheme('retro')">retro</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header style="display:flex; justify-content:space-between; align-items:center; max-width:900px; margin:0 auto 24px; width:100%;">
    <a href="/" style="display:flex; align-items:center; gap:6px; text-decoration:none; color:inherit;">
      <button class="icon-btn" style="padding:4px;">
        <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
      </button>
      <span style="font-weight:600;">eleven</span>
    </a>
    <div style="display:flex; align-items:center; gap:16px;">
      <div id="gameStats" style="display:none; gap:16px; align-items:center;">
        <span class="semi" style="font-size:13px;">sayaç: <span id="numberDisplay" style="color:#fff; font-weight:500;">0</span></span>
        <span class="semi" style="font-size:13px;">kalan: <span id="aliveCount" style="color:#fff; font-weight:500;">—</span></span>
      </div>
      <span class="muted" style="font-size:13px; font-family:monospace;">kod: <span id="roomCode" style="color:#a3a3a3;"></span></span>
      <button class="icon-btn" onclick="openSettings()">
        <i data-lucide="settings" style="width:18px;height:18px;"></i>
      </button>
    </div>
  </header>

  <div style="max-width:900px; margin:0 auto;">

    <!-- Lobby -->
    <div id="lobby" style="display:none; max-width:360px; margin:0 auto;">
      <div class="card">
        <p style="font-size:11px; color:#525252; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:16px;">oyuncular</p>
        <ul id="playerList" style="list-style:none; padding:0; margin:0 0 16px;"></ul>
        <p id="waitMsg" style="display:none; font-size:12px; color:#525252; text-align:center; margin-bottom:12px;">host oyunu başlatmasını bekliyor...</p>
        <button id="startBtn" class="btn-primary" style="display:none; width:100%;" onclick="startGame()">oyunu başlat</button>
      </div>
    </div>

    <!-- Game -->
    <div id="game" style="display:none;">

      <!-- Turn banner -->
      <div id="turnBanner" class="banner-waiting" style="text-align:center; padding:12px 16px; margin-bottom:12px; font-size:13px;"></div>

      <!-- Move input -->
      <div style="display:flex; gap:8px; margin-bottom:4px;">
        <input id="moveInput" type="text" placeholder="1  veya  1,2  veya  1,2,3" autocomplete="off"
          style="flex:1;">
        <button class="btn-secondary" onclick="sendMove()">gönder</button>
      </div>
      <p id="moveError" style="color:#f87171; font-size:11px; min-height:16px; margin-bottom:12px; padding-left:4px;"></p>

      <!-- Feed -->
      <div id="feed" style="text-align:center; margin-bottom:12px; min-height:16px;"></div>

      <!-- Grid -->
      <div id="grid" style="display:flex; flex-direction:column; gap:8px; align-items:center;"></div>

    </div>
  </div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
lucide.createIcons()

// Theme
function getTheme() { return localStorage.getItem("theme") || "classic" }
function setTheme(t) {
  localStorage.setItem("theme", t)
  applyTheme(t)
  updateThemeBtns(t)
}
function applyTheme(t) {
  document.body.className = t + " min-h-screen p-4 pb-16"
  document.getElementById("nesCss").disabled = (t !== "retro")
  lucide.createIcons()
}
function updateThemeBtns(t) {
  document.getElementById("btnClassic").classList.toggle("active", t === "classic")
  document.getElementById("btnRetro").classList.toggle("active", t === "retro")
}
function openSettings() {
  updateThemeBtns(getTheme())
  document.getElementById("settingsModal").classList.remove("hidden")
}
function closeSettings() {
  document.getElementById("settingsModal").classList.add("hidden")
}

applyTheme(getTheme())

// Socket
const socket = io()
const params = new URLSearchParams(window.location.search)
const roomCode = params.get("room")
let playerName = params.get("name") || localStorage.getItem("playerName")

document.getElementById("roomCode").textContent = roomCode

function showOverlay(html) {
  document.getElementById("overlayBox").innerHTML = html
  document.getElementById("overlay").classList.remove("hidden")
}
function hideOverlay() {
  document.getElementById("overlay").classList.add("hidden")
}

if (!playerName) {
  showOverlay(`
    <p style="font-weight:600; margin-bottom:4px;">hoş geldin</p>
    <p style="font-size:12px; color:#737373; margin-bottom:16px;">adınız ne?</p>
    <input id="nameInput" type="text" placeholder="isminiz" maxlength="20" style="margin-bottom:8px;">
    <p id="overlayErr" style="color:#f87171; font-size:11px; min-height:14px; margin-bottom:12px;"></p>
    <button class="btn-primary" style="width:100%;" onclick="saveName()">devam</button>
  `)
} else {
  joinRoom()
}

function saveName() {
  const name = document.getElementById("nameInput").value.trim()
  if (!name) { document.getElementById("overlayErr").textContent = "isim boş olamaz"; return }
  localStorage.setItem("playerName", name)
  playerName = name
  hideOverlay()
  joinRoom()
}

function joinRoom() {
  socket.emit("joinRoom", { name: playerName, code: roomCode })
}

socket.on("errorMessage", msg => {
  showOverlay(`
    <p style="font-weight:600; margin-bottom:4px;">hata</p>
    <p style="font-size:12px; color:#737373; margin-bottom:16px;">${msg}</p>
    <button class="btn-secondary" style="width:100%;" onclick="window.location='/'">geri dön</button>
  `)
})

socket.on("updateRoom", data => render(data))
socket.on("playerEliminated", ({ name }) => addFeed(`💀 ${name} elendi`))

socket.on("gameOver", ({ winner, reason }) => {
  const isMe = winner === playerName
  const emoji = isMe ? "🏆" : "👾"
  const title = isMe ? "kazandın!" : "oyun bitti"
  const sub = reason === "opponent_left"
    ? (isMe ? "rakip ayrıldı." : `rakip ayrıldı. kazanan: ${winner}`)
    : (isMe ? "tebrikler!" : `kazanan: ${winner}`)
  showOverlay(`
    <p style="font-size:36px; margin-bottom:8px;">${emoji}</p>
    <p style="font-weight:600; margin-bottom:4px;">${title}</p>
    <p style="font-size:12px; color:#737373; margin-bottom:20px;">${sub}</p>
    <div style="display:flex; gap:8px;">
      <button class="btn-primary" style="flex:1;" onclick="location.reload()">tekrar</button>
      <button class="btn-secondary" style="flex:1;" onclick="window.location='/'">çıkış</button>
    </div>
  `)
})

function render(data) {
  if (data.started) {
    document.getElementById("lobby").style.display = "none"
    document.getElementById("game").style.display = "block"
    document.getElementById("gameStats").style.display = "flex"
  } else {
    document.getElementById("lobby").style.display = "block"
    document.getElementById("game").style.display = "none"
    document.getElementById("gameStats").style.display = "none"

    const list = document.getElementById("playerList")
    list.innerHTML = ""
    data.players.forEach(p => {
      const li = document.createElement("li")
      li.className = "player-li"
      li.style.cssText = "display:flex; justify-content:space-between; align-items:center; padding:10px 0; font-size:13px;"
      li.innerHTML = `<span>${p}</span>` + (p === data.host ? `<span style="font-size:10px; color:#525252;">host</span>` : "")
      list.appendChild(li)
    })

    document.getElementById("startBtn").style.display = playerName === data.host ? "block" : "none"
    document.getElementById("waitMsg").style.display = playerName !== data.host ? "block" : "none"
    return
  }

  document.getElementById("numberDisplay").textContent = data.currentNumber
  document.getElementById("aliveCount").textContent = data.players.length

  const currentPlayer = data.players[data.currentPlayerIndex]
  const isMyTurn = currentPlayer === playerName
  const banner = document.getElementById("turnBanner")
  const input = document.getElementById("moveInput")

  if (isMyTurn) {
    banner.textContent = "sıra sende"
    banner.className = "banner-my-turn"
    input.disabled = false
    input.focus()
  } else {
    banner.textContent = `sıra: ${currentPlayer || ""}`
    banner.className = "banner-waiting"
    input.disabled = true
  }

  const eliminated = data.eliminated || []
  const seats = []
  for (let i = 0; i < data.rows * data.cols; i++) {
    if (i < data.players.length) seats.push({ name: data.players[i], state: "active" })
    else if (i < data.players.length + eliminated.length) seats.push({ name: eliminated[i - data.players.length], state: "out" })
    else seats.push(null)
  }

  const grid = document.getElementById("grid")
  grid.innerHTML = ""
  let idx = 0
  for (let r = 0; r < data.rows; r++) {
    const row = document.createElement("div")
    row.style.cssText = "display:flex; gap:8px; flex-wrap:wrap; justify-content:center;"
    for (let c = 0; c < data.cols; c++) {
      const seat = seats[idx]
      const desk = document.createElement("div")
      desk.className = "desk-base"
      desk.style.cssText = "width:96px; height:64px; display:flex; align-items:center; justify-content:center; position:relative;"

      const num = document.createElement("div")
      num.style.cssText = "position:absolute; top:4px; right:6px; font-size:10px; color:#404040;"
      num.textContent = idx + 1
      desk.appendChild(num)

      if (seat) {
        const nameEl = document.createElement("div")
        nameEl.style.cssText = "font-size:11px; text-align:center; padding:0 4px; word-break:break-all; line-height:1.3;"

        if (seat.state === "out") {
          desk.style.opacity = "0.2"
          nameEl.style.textDecoration = "line-through"
          nameEl.style.color = "#525252"
          nameEl.textContent = seat.name
        } else {
          nameEl.textContent = seat.name
          if (idx === data.currentPlayerIndex) desk.classList.add("desk-active-turn")
          if (seat.name === playerName) desk.classList.add("desk-me")
        }
        desk.appendChild(nameEl)
      }

      row.appendChild(desk)
      idx++
    }
    grid.appendChild(row)
  }
}

function addFeed(msg) {
  const feed = document.getElementById("feed")
  const p = document.createElement("p")
  p.style.cssText = "font-size:11px; color:#525252; margin:2px 0;"
  p.textContent = msg
  feed.prepend(p)
  while (feed.children.length > 4) feed.removeChild(feed.lastChild)
}

function startGame() { socket.emit("startGame") }

function sendMove() {
  const input = document.getElementById("moveInput")
  const errEl = document.getElementById("moveError")
  const val = input.value.trim()
  errEl.textContent = ""
  if (!val) { errEl.textContent = "sayı girin"; return }
  const nums = val.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n))
  if (nums.length === 0 || nums.length > 3) { errEl.textContent = "1 ile 3 arasında sayı girin"; return }
  socket.emit("move", nums)
  input.value = ""
}

document.addEventListener("keydown", e => { if (e.key === "Enter") sendMove() })
</script>
</body>
</html>
