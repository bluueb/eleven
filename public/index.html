<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleven</title>
<link href="https://cdn.jsdelivr.net/npm/psone.css/ps1.css" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem 1rem;
  font-family: inherit;
}

h1 {
  color: #fff;
  font-size: 2.5rem;
  letter-spacing: 0.4rem;
  text-align: center;
  margin-bottom: 0.3rem;
}
.subtitle {
  color: #888;
  font-size: 0.7rem;
  text-align: center;
  margin-bottom: 2.5rem;
  letter-spacing: 0.2rem;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  width: 100%;
  max-width: 420px;
}

.ps1-container {
  padding: 1.5rem;
}

.ps1-container h2 {
  font-size: 0.75rem;
  letter-spacing: 0.15rem;
  color: #aaa;
  margin-bottom: 1.2rem;
  text-transform: uppercase;
}

label {
  display: block;
  font-size: 0.7rem;
  color: #aaa;
  margin-bottom: 0.3rem;
}

.ps1-input, .ps1-select {
  width: 100%;
  margin-bottom: 1rem;
}

.ps1-btn {
  width: 100%;
}

.divider {
  text-align: center;
  color: #444;
  font-size: 0.7rem;
  letter-spacing: 0.2rem;
}

#errorMsg {
  display: none;
  color: #e74c3c;
  font-size: 0.7rem;
  text-align: center;
  margin-top: 1rem;
}
</style>
</head>
<body>

<h1>ELEVEN</h1>
<p class="subtitle">sayı oyunu</p>

<div class="cards">

  <div class="ps1-container is-dark">
    <h2>Oluştur</h2>
    <label>İsim</label>
    <input id="name" class="ps1-input" type="text" maxlength="20" placeholder="adınız...">
    <label>Sınıf Boyutu</label>
    <select id="gridSize" class="ps1-select">
      <option value="5x4">5 × 4 — 20 kişi</option>
      <option value="5x5">5 × 5 — 25 kişi</option>
      <option value="4x4">4 × 4 — 16 kişi</option>
      <option value="6x5">6 × 5 — 30 kişi</option>
    </select>
    <button class="ps1-btn is-primary" onclick="createRoom()">Parti Oluştur</button>
  </div>

  <div class="divider">— YA DA —</div>

  <div class="ps1-container is-dark">
    <h2>Katıl</h2>
    <label>İsim</label>
    <input id="nameJoin" class="ps1-input" type="text" maxlength="20" placeholder="adınız...">
    <label>Parti Kodu</label>
    <input id="code" class="ps1-input" type="text" maxlength="10" placeholder="XXXXX" style="text-transform:uppercase;letter-spacing:0.3rem;">
    <button class="ps1-btn is-warning" onclick="joinRoom()">Katıl</button>
  </div>

</div>

<p id="errorMsg"></p>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()

function showError(msg) {
  const el = document.getElementById("errorMsg")
  el.textContent = msg
  el.style.display = "block"
}
function clearError() {
  const el = document.getElementById("errorMsg")
  el.textContent = ""
  el.style.display = "none"
}

function createRoom() {
  clearError()
  const name = document.getElementById("name").value.trim()
  if (!name) return showError("İsim boş olamaz.")
  const grid = document.getElementById("gridSize").value
  const [cols, rows] = grid.split("x").map(Number)
  localStorage.setItem("playerName", name)
  socket.emit("createRoom", { name, rows, cols })
}

function joinRoom() {
  clearError()
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (!name) return showError("İsim boş olamaz.")
  if (!code) return showError("Parti kodu boş olamaz.")
  localStorage.setItem("playerName", name)
  socket.emit("joinRoom", { name, code })
}

socket.on("roomCreated", code => {
  const name = document.getElementById("name").value.trim()
  window.location = `/game.html?room=${code}&name=${encodeURIComponent(name)}`
})
socket.on("updateRoom", () => {
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (code) window.location = `/game.html?room=${code}&name=${encodeURIComponent(name)}`
})
socket.on("errorMessage", msg => showError(msg))

document.getElementById("name").addEventListener("keydown", e => { if (e.key === "Enter") createRoom() })
document.getElementById("nameJoin").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom() })
document.getElementById("code").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom() })
</script>
</body>
</html>
