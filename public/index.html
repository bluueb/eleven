<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eleven</title>
<link rel="stylesheet" href="https://unpkg.com/7.css">
<style>
  body {
    background: #1a3a5c url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="4" height="4" fill="%231a3a5c"/><rect width="1" height="1" fill="%23204a72" opacity="0.5"/></svg>');
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
  }

  .desktop-icon {
    text-align: center;
    margin-bottom: 20px;
    color: white;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }

  .desktop-icon h1 {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 6px;
    margin: 0 0 2px;
    color: #fff;
    text-shadow: 0 0 10px rgba(100,180,255,0.8), 1px 1px 3px rgba(0,0,0,0.9);
  }

  .desktop-icon p {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
  }

  .main-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .window {
    min-width: 260px;
  }

  .window-body.has-space {
    padding: 12px;
  }

  .or-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 11px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    padding: 8px;
    align-self: center;
  }

  .field-row-stacked {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 10px;
  }

  .field-row-stacked label {
    font-size: 11px;
  }

  .field-row-stacked input,
  .field-row-stacked select {
    width: 100%;
    box-sizing: border-box;
  }

  #errorMsg {
    display: none;
    color: #c0392b;
    font-size: 11px;
    text-align: center;
    margin-top: 10px;
    background: white;
    border: 1px solid #c0392b;
    padding: 4px 8px;
    font-weight: bold;
  }

  button[type="button"], button {
    cursor: pointer;
  }

  .btn-full {
    width: 100%;
    margin-top: 4px;
  }
</style>
</head>
<body>

  <div class="desktop-icon">
    <h1>ELEVEN</h1>
    <p>sayı oyunu</p>
  </div>

  <div class="main-layout">

    <!-- CREATE WINDOW -->
    <div class="window active" style="max-width: 280px; width: 280px;">
      <div class="title-bar">
        <div class="title-bar-text">Parti Oluştur</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize" disabled></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body has-space">
        <div class="field-row-stacked">
          <label for="name">İsim:</label>
          <input id="name" type="text" maxlength="20" placeholder="adınız...">
        </div>
        <div class="field-row-stacked">
          <label for="gridSize">Sınıf Boyutu:</label>
          <select id="gridSize">
            <option value="5x4">5 × 4 — 20 kişi</option>
            <option value="5x5">5 × 5 — 25 kişi</option>
            <option value="4x4">4 × 4 — 16 kişi</option>
            <option value="6x5">6 × 5 — 30 kişi</option>
          </select>
        </div>
        <div style="text-align: right; margin-top: 12px;">
          <button class="default" onclick="createRoom()">Parti Oluştur</button>
        </div>
      </div>
    </div>

    <div class="or-divider">— YA DA —</div>

    <!-- JOIN WINDOW -->
    <div class="window active" style="max-width: 280px; width: 280px;">
      <div class="title-bar">
        <div class="title-bar-text">Partiye Katıl</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize" disabled></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body has-space">
        <div class="field-row-stacked">
          <label for="nameJoin">İsim:</label>
          <input id="nameJoin" type="text" maxlength="20" placeholder="adınız...">
        </div>
        <div class="field-row-stacked">
          <label for="code">Parti Kodu:</label>
          <input id="code" type="text" maxlength="10" placeholder="XXXXX" autocomplete="off" style="text-transform:uppercase; letter-spacing: 4px;">
        </div>
        <div style="text-align: right; margin-top: 12px;">
          <button onclick="joinRoom()">Katıl</button>
        </div>
      </div>
    </div>

  </div>

  <div id="errorMsg"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()

function showError(msg) {
  const el = document.getElementById("errorMsg")
  el.textContent = msg
  el.style.display = "block"
}
function clearError() {
  document.getElementById("errorMsg").style.display = "none"
}

function createRoom() {
  clearError()
  const name = document.getElementById("name").value.trim()
  if (!name) return showError("İsim boş olamaz.")
  const grid = document.getElementById("gridSize").value
  const [cols, rows] = grid.split("x").map(Number)
  localStorage.setItem("playerName", name)
  socket.emit("createRoom", { name, rows, cols })
}

function joinRoom() {
  clearError()
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (!name) return showError("İsim boş olamaz.")
  if (!code) return showError("Parti kodu boş olamaz.")
  localStorage.setItem("playerName", name)
  socket.emit("joinRoom", { name, code })
}

socket.on("roomCreated", code => {
  const name = document.getElementById("name").value.trim()
  window.location = `/game.html?room=${code}&name=${encodeURIComponent(name)}`
})
socket.on("updateRoom", () => {
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (code) window.location = `/game.html?room=${code}&name=${encodeURIComponent(name)}`
})
socket.on("errorMessage", msg => showError(msg))

document.getElementById("name").addEventListener("keydown", e => { if (e.key === "Enter") createRoom() })
document.getElementById("nameJoin").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom() })
document.getElementById("code").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom() })
</script>
</body>
</html>
