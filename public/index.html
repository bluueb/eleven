<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eleven</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen flex flex-col items-center justify-center p-6">

  <div class="mb-10 text-center">
    <p class="text-3xl font-semibold text-white tracking-tight mb-1">eleven</p>
    <p class="text-neutral-500 text-sm">sayı oyunu</p>
  </div>

  <div class="w-full max-w-2xl">
    <div class="flex flex-col md:flex-row gap-4 items-stretch">

      <!-- Create -->
      <div class="flex-1 bg-neutral-900 border border-neutral-800 rounded-2xl p-6 flex flex-col">
        <p class="text-xs text-neutral-500 uppercase tracking-widest mb-5">parti oluştur</p>
        <div class="flex flex-col gap-4 flex-1">
          <div class="flex flex-col gap-1.5">
            <label class="text-xs text-neutral-400">isim</label>
            <input id="name" type="text" maxlength="20" placeholder="adınız"
              class="bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-neutral-600 outline-none focus:border-neutral-500 transition-colors">
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-xs text-neutral-400">sınıf boyutu</label>
            <select id="gridSize"
              class="bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-2.5 text-sm text-white outline-none focus:border-neutral-500 transition-colors cursor-pointer">
              <option value="5x4">5 × 4 — 20 kişi</option>
              <option value="5x5">5 × 5 — 25 kişi</option>
              <option value="4x4">4 × 4 — 16 kişi</option>
              <option value="6x5">6 × 5 — 30 kişi</option>
            </select>
          </div>
          <button onclick="createRoom()"
            class="mt-auto bg-white text-neutral-950 font-medium text-sm rounded-xl py-2.5 hover:bg-neutral-200 transition-colors cursor-pointer">
            oluştur
          </button>
        </div>
      </div>

      <!-- Divider -->
      <div class="flex md:flex-col items-center gap-2 md:gap-3 py-2 md:py-6">
        <div class="flex-1 h-px md:h-full md:w-px bg-neutral-800"></div>
        <span class="text-neutral-600 text-xs shrink-0">ya da</span>
        <div class="flex-1 h-px md:h-full md:w-px bg-neutral-800"></div>
      </div>

      <!-- Join -->
      <div class="flex-1 bg-neutral-900 border border-neutral-800 rounded-2xl p-6 flex flex-col">
        <p class="text-xs text-neutral-500 uppercase tracking-widest mb-5">partiye katıl</p>
        <div class="flex flex-col gap-4 flex-1">
          <div class="flex flex-col gap-1.5">
            <label class="text-xs text-neutral-400">isim</label>
            <input id="nameJoin" type="text" maxlength="20" placeholder="adınız"
              class="bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-neutral-600 outline-none focus:border-neutral-500 transition-colors">
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-xs text-neutral-400">parti kodu</label>
            <input id="code" type="text" maxlength="10" placeholder="xxxxx" autocomplete="off"
              class="bg-neutral-800 border border-neutral-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-neutral-600 outline-none focus:border-neutral-500 transition-colors uppercase tracking-widest">
          </div>
          <button onclick="joinRoom()"
            class="mt-auto bg-neutral-800 border border-neutral-700 text-white font-medium text-sm rounded-xl py-2.5 hover:bg-neutral-700 transition-colors cursor-pointer">
            katıl
          </button>
        </div>
      </div>

    </div>
    <p id="errorMsg" class="hidden text-red-400 text-sm text-center mt-4"></p>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()

function showError(msg) {
  const el = document.getElementById("errorMsg")
  el.textContent = msg
  el.classList.remove("hidden")
}
function clearError() {
  document.getElementById("errorMsg").classList.add("hidden")
}

function createRoom() {
  clearError()
  const name = document.getElementById("name").value.trim()
  if (!name) return showError("isim boş olamaz")
  const grid = document.getElementById("gridSize").value
  const [cols, rows] = grid.split("x").map(Number)
  localStorage.setItem("playerName", name)
  socket.emit("createRoom", { name, rows, cols })
}

function joinRoom() {
  clearError()
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (!name) return showError("isim boş olamaz")
  if (!code) return showError("parti kodu boş olamaz")
  localStorage.setItem("playerName", name)
  socket.emit("joinRoom", { name, code })
}

socket.on("roomCreated", code => {
  const name = document.getElementById("name").value.trim()
  window.location = `/game.html?room=${code}&name=${encodeURIComponent(name)}`
})
socket.on("updateRoom", () => {
  const name = document.getElementById("nameJoin").value.trim()
  const code = document.getElementById("code").value.trim().toUpperCase()
  if (code) window.location = `/game.html?room=${code}&name=${encodeURIComponent(name)}`
})
socket.on("errorMessage", msg => showError(msg))

document.getElementById("name").addEventListener("keydown", e => { if (e.key === "Enter") createRoom() })
document.getElementById("nameJoin").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom() })
document.getElementById("code").addEventListener("keydown", e => { if (e.key === "Enter") joinRoom() })
</script>
</body>
</html>
